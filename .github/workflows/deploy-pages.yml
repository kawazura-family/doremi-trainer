# GitHub Pages へ自動デプロイ(静的サイト・ビルド不要)
# main への push、または手動実行(workflow_dispatch)でトリガーする。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN に Pages デプロイ用の権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに(古い実行はキャンセル)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pages の設定
        uses: actions/configure-pages@v5

      - name: 成果物をアップロード(リポジトリ全体)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
