<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="おんぷれんしゅう">
<title>おんぷ よみ れんしゅう</title>
<script src="https://cdn.jsdelivr.net/npm/vexflow@4/build/cjs/vexflow.js"></script>
<style>
  :root{
    --bg:#fff6e0;
    --card:#ffffff;
    --ink:#3a3a55;
    --accent:#ff7a59;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:"Hiragino Maru Gothic ProN","Hiragino Maru Gothic Pro",
      "Yu Gothic","Hiragino Kaku Gothic ProN",sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    -webkit-text-size-adjust:100%;
  }
  .app{
    max-width:480px;
    margin:0 auto;
    padding:14px 14px 32px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  h1{
    text-align:center;
    font-size:1.5rem;
    margin:6px 0 0;
    color:var(--accent);
  }
  /* レベル選択 */
  .levels{
    display:flex;
    gap:8px;
  }
  .levels button{
    flex:1;
    min-height:56px;
    font-size:1.05rem;
    font-weight:bold;
    border:3px solid #cfc3ee;
    border-radius:16px;
    background:#f0ebff;
    color:#5b4b9a;
    touch-action:manipulation;
    cursor:pointer;
  }
  .levels button.active{
    background:#7c5cd6;
    border-color:#7c5cd6;
    color:#fff;
  }
  /* 譜表カード */
  .score-card{
    background:var(--card);
    border-radius:20px;
    padding:14px 10px 8px;
    box-shadow:0 6px 16px rgba(0,0,0,.10);
    text-align:center;
  }
  /* 420:220 の比率を持つ枠。SVG はこの枠を絶対配置で埋めるので、
     viewBox の固有比の解釈に依存せず iOS Safari でも枠からはみ出さない。 */
  #score{
    position:relative;
    width:100%;
    padding-top:52.38%; /* 220 / 420 */
  }
  #score svg{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:block;
  }
  /* 答え表示 */
  .answer-card{
    background:#fff;
    border-radius:20px;
    box-shadow:0 6px 16px rgba(0,0,0,.10);
    padding:16px 10px;
    text-align:center;
    height:84px;            /* 内容によらず高さを固定 */
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .answer-card .placeholder{
    font-size:1.1rem;
    color:#c9c2b4;
    white-space:nowrap;
  }
  /* 答えは常に 1 行。幅に収まらない時は JS(fitAnswer)でフォントを縮小する */
  .answer-card .answer{
    font-size:2.6rem;
    font-weight:bold;
    color:var(--accent);
    letter-spacing:.04em;
    white-space:nowrap;
  }
  /* 操作ボタン */
  .actions{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .actions button{
    min-height:64px;
    font-size:1.3rem;
    font-weight:bold;
    border:none;
    border-radius:18px;
    color:#fff;
    touch-action:manipulation;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
  }
  .actions button:active{ transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.15); }
  .btn-answer{ background:#43a047; }
  .btn-next{ background:#fb8c00; }
  /* スタートオーバーレイ */
  .overlay{
    position:fixed;
    inset:0;
    background:linear-gradient(160deg,#ffd66b,#ff9a59);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:24px;
    z-index:50;
    padding:24px;
    text-align:center;
  }
  .overlay h2{
    font-size:2rem;
    color:#fff;
    margin:0;
    text-shadow:0 2px 6px rgba(0,0,0,.2);
  }
  .overlay p{
    font-size:1.05rem;
    color:#fff;
    margin:0;
  }
  #startBtn{
    min-height:90px;
    min-width:240px;
    font-size:2rem;
    font-weight:bold;
    border:none;
    border-radius:26px;
    background:#fff;
    color:var(--accent);
    box-shadow:0 6px 0 rgba(0,0,0,.18);
    touch-action:manipulation;
    cursor:pointer;
  }
  #startBtn:active{ transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.18); }
  .hidden{ display:none !important; }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <h2>♪ おんぷ よみ れんしゅう ♪</h2>
  <p>ボタンを おして はじめよう</p>
  <button id="startBtn">スタート</button>
</div>

<div class="app">
  <h1>♪ おんぷ よみ れんしゅう ♪</h1>

  <div class="levels" id="levels">
    <button data-level="1">レベル1<br>たんおん</button>
    <button data-level="2">レベル2<br>わおん</button>
    <button data-level="3">レベル3<br>1しょうせつ</button>
  </div>

  <div class="score-card">
    <div id="score"></div>
  </div>

  <div class="answer-card" id="answerCard">
    <span class="placeholder">「こたえあわせ」を おしてね</span>
  </div>

  <div class="actions">
    <button class="btn-answer" id="answerBtn">♪ こたえあわせ</button>
    <button class="btn-next" id="nextBtn">つぎの もんだい</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---- 音楽データ ----------------------------------------------------
  var LETTERS = ['C','D','E','F','G','A','B'];
  var PITCH_CLASS = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
  var JP_NAME = { C:'ド', D:'レ', E:'ミ', F:'ファ', G:'ソ', A:'ラ', B:'シ' };

  // 白鍵を範囲指定で列挙(縦位置は音名+オクターブのみで決まる)
  function whiteRange(loL, loO, hiL, hiO){
    var res = [], li = LETTERS.indexOf(loL), oct = loO;
    while(true){
      res.push({ letter:LETTERS[li], octave:oct });
      if(LETTERS[li] === hiL && oct === hiO) break;
      li++;
      if(li > 6){ li = 0; oct++; }
    }
    return res;
  }
  // 加線2本以内に収まる音域
  var TREBLE_POOL = whiteRange('C',4,'A',5); // ト音記号 C4〜A5(13音)
  var BASS_POOL   = whiteRange('C',2,'E',4); // ヘ音記号 C2〜E4(17音)

  function randInt(min, max){ return min + Math.floor(Math.random() * (max - min + 1)); }
  function pick(arr){ return arr[randInt(0, arr.length - 1)]; }

  // 単音・小節用: 30%で臨時記号。E#/B#/Cb/Fb など紛らわしい異名同音は避ける
  function accidentalFor(letter){
    if(Math.random() >= 0.3) return null;
    var canSharp = (letter !== 'E' && letter !== 'B');
    var canFlat  = (letter !== 'C' && letter !== 'F');
    if(canSharp && canFlat) return Math.random() < 0.5 ? '#' : 'b';
    if(canSharp) return '#';
    if(canFlat)  return 'b';
    return null;
  }

  // 3和音(レベル2): 白鍵に3度ずつ堆積した三和音のうち、根音が C/D/F/G/A の
  // もの = ハ長調・ニ短調・ヘ長調・ト長調・イ短調の主和音に限定する
  // (根音 E のホ短調・根音 B の減三和音は除外)。
  var TRIAD_ROOTS = ['C','D','F','G','A'];
  function makeTriad(pool){
    var maxRoot = pool.length - 5; // 第5音(根音+4)が音域に収まる範囲
    var roots = [];
    for(var i = 0; i <= maxRoot; i++){
      if(TRIAD_ROOTS.indexOf(pool[i].letter) !== -1) roots.push(i);
    }
    var ri = pick(roots);
    return [pool[ri], pool[ri+2], pool[ri+4]].map(function(p){
      return { letter:p.letter, octave:p.octave, accidental:null };
    });
  }

  // 平均律 A4=440Hz
  function noteFreq(n){
    var pc = PITCH_CLASS[n.letter] + (n.accidental === '#' ? 1 : n.accidental === 'b' ? -1 : 0);
    var midi = 12 * (n.octave + 1) + pc;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }
  function vfKey(n){ return n.letter.toLowerCase() + '/' + n.octave; }
  function jpName(n){
    return JP_NAME[n.letter] + (n.accidental === '#' ? '♯' : n.accidental === 'b' ? '♭' : '');
  }

  // ---- 状態 ----------------------------------------------------------
  var state = { level:1, clef:'treble', notes:[] };

  // ---- DOM -----------------------------------------------------------
  var overlay   = document.getElementById('overlay');
  var startBtn  = document.getElementById('startBtn');
  var levelsBox = document.getElementById('levels');
  var scoreDiv  = document.getElementById('score');
  var answerCard= document.getElementById('answerCard');
  var answerBtn = document.getElementById('answerBtn');
  var nextBtn   = document.getElementById('nextBtn');

  // ---- 五線譜描画(VexFlow 4)----------------------------------------
  var SCORE_W = 420, SCORE_H = 220;

  function render(){
    scoreDiv.innerHTML = '';
    var VF = Vex.Flow;
    var renderer = new VF.Renderer(scoreDiv, VF.Renderer.Backends.SVG);
    renderer.resize(SCORE_W, SCORE_H);
    var ctx = renderer.getContext();

    var stave = new VF.Stave(10, 40, SCORE_W - 30);
    stave.addClef(state.clef);
    if(state.level === 3) stave.addTimeSignature('4/4');
    stave.setContext(ctx).draw();

    var staveNotes;
    if(state.level === 3){
      staveNotes = state.notes.map(function(n){
        var sn = new VF.StaveNote({ clef:state.clef, keys:[vfKey(n)], duration:'q' });
        if(n.accidental) sn.addModifier(new VF.Accidental(n.accidental), 0);
        return sn;
      });
    } else if(state.level === 2){
      var chord = new VF.StaveNote({
        clef:state.clef, keys:state.notes.map(vfKey), duration:'w'
      });
      state.notes.forEach(function(n, i){
        if(n.accidental) chord.addModifier(new VF.Accidental(n.accidental), i);
      });
      staveNotes = [chord];
    } else {
      var n0 = state.notes[0];
      var sn0 = new VF.StaveNote({ clef:state.clef, keys:[vfKey(n0)], duration:'w' });
      if(n0.accidental) sn0.addModifier(new VF.Accidental(n0.accidental), 0);
      staveNotes = [sn0];
    }

    var voice = new VF.Voice({ num_beats:4, beat_value:4 });
    voice.setMode(VF.Voice.Mode.SOFT);
    voice.addTickables(staveNotes);

    var fmtW = Math.max(120, stave.getNoteEndX() - stave.getNoteStartX() - 30);
    new VF.Formatter().joinVoices([voice]).format([voice], fmtW);
    voice.draw(ctx, stave);

    // viewBox 化して #score の比率枠にフィットさせる。VexFlow が付ける
    // 幅・高さ指定(属性/インラインスタイル)は取り除き、サイズは CSS の
    // width/height:100% に委ねる(iPhone でのはみ出しを防ぐ)。
    var svg = scoreDiv.querySelector('svg');
    if(svg){
      svg.setAttribute('viewBox', '0 0 ' + SCORE_W + ' ' + SCORE_H);
      svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      svg.removeAttribute('width');
      svg.removeAttribute('height');
      svg.style.width = '100%';
      svg.style.height = '100%';
    }
  }

  // ---- 問題生成 ------------------------------------------------------
  function newProblem(){
    state.clef = Math.random() < 0.5 ? 'treble' : 'bass';
    var pool = state.clef === 'treble' ? TREBLE_POOL : BASS_POOL;

    if(state.level === 1){
      var p = pick(pool);
      state.notes = [{ letter:p.letter, octave:p.octave, accidental:accidentalFor(p.letter) }];
    } else if(state.level === 2){
      state.notes = makeTriad(pool);
    } else {
      state.notes = [];
      for(var i = 0; i < 4; i++){
        var q = pick(pool);
        state.notes.push({ letter:q.letter, octave:q.octave, accidental:accidentalFor(q.letter) });
      }
    }

    answerCard.innerHTML = '<span class="placeholder">「こたえあわせ」を おしてね</span>';
    render();
  }

  function showAnswer(){
    var text = state.notes.map(jpName).join('・');
    answerCard.innerHTML = '<span class="answer"></span>';
    var span = answerCard.querySelector('.answer');
    span.textContent = text;
    fitAnswer(span);
  }

  // 答えの文字を、高さ固定のボックスに 1 行で収まるようフォントを自動縮小する。
  // 1 行の文字幅はフォントサイズに比例するので、はみ出した分だけ一度比例縮小する。
  function fitAnswer(span){
    span.style.fontSize = '';                                 // CSS 既定(2.6rem)へ戻す
    var base  = parseFloat(getComputedStyle(span).fontSize);  // 既定サイズ(px)
    var cs    = getComputedStyle(answerCard);
    var avail = answerCard.clientWidth
      - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
    if(avail > 0 && span.scrollWidth > avail){
      span.style.fontSize = (base * avail / span.scrollWidth * 0.97) + 'px';
    }
  }

  // ---- 音声(Web Audio API / ピアノ風)-------------------------------
  // 倍音を別オシレータで加算合成してピアノ風の音色を作る。各倍音は速い
  // アタックのあと指数関数的に減衰し(setTargetAtTime)、高い倍音ほど速く
  // 減衰させることで打鍵後に音色がまろやかになる(実際のピアノの挙動)。
  // ※ Safari で音が出るかどうかは、エンベロープの種類ではなく、スタート操作内で
  //   発音ノードを即時に start() して音声出力を起動できているかで決まる
  //   (primeAudio を参照)。
  var audioCtx = null;

  // ピアノ風の倍音構成。n は基音に対する倍数、amp は基音に対する音量比、
  // decay は基音の減衰時定数に対する比(上の倍音ほど小さい=速く減衰する)。
  var PARTIALS = [
    { n: 1, amp: 1.00,  decay: 1.00 },
    { n: 2, amp: 0.40,  decay: 0.66 },
    { n: 3, amp: 0.22,  decay: 0.48 },
    { n: 4, amp: 0.12,  decay: 0.36 },
    { n: 5, amp: 0.07,  decay: 0.28 },
    { n: 6, amp: 0.045, decay: 0.22 }
  ];

  // 1音をピアノ風に発音する。各倍音は速いアタックのあと指数関数的に減衰し
  // (setTargetAtTime)、弦の硬さによる倍音のわずかな上ずり(インハーモニ
  // シティ)も加える。when=発音開始, dur=打ち切るまでの長さ, peak=最大ゲイン。
  function playPiano(freq, when, dur, peak){
    var attack  = 0.004;                              // 打鍵の速いアタック
    var release = 0.12;                               // 末尾のフェード(ノイズ防止)
    var INHARM  = 0.0004;                             // 倍音の上ずり係数
    var baseDecay = 0.7 + Math.min(1.8, 150 / freq);  // 低音ほど長く伸びる

    // 全倍音をまとめ、末尾だけ線形に絞ってプツッというノイズを防ぐ。
    var voice = audioCtx.createGain();
    voice.gain.setValueAtTime(peak, when);
    voice.gain.setValueAtTime(peak, when + dur - release);
    voice.gain.linearRampToValueAtTime(0, when + dur);
    voice.connect(audioCtx.destination);

    for(var i = 0; i < PARTIALS.length; i++){
      var p = PARTIALS[i];
      var f = freq * p.n * Math.sqrt(1 + INHARM * p.n * p.n);
      if(f > 13000) continue; // 可聴上限を超える倍音は省略
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f, when);

      gain.gain.setValueAtTime(0, when);
      gain.gain.linearRampToValueAtTime(p.amp, when + attack);          // 速いアタック
      gain.gain.setTargetAtTime(0, when + attack, baseDecay * p.decay); // 指数減衰

      osc.connect(gain);
      gain.connect(voice);
      osc.start(when);
      osc.stop(when + dur + 0.03);
    }
  }

  // 音声出力の起動。これが本質的に重要: Safari/WebKit は AudioContext を
  // resume() しただけでは音声出力ユニットが起動せず、後続の発音が無音になる
  // ことがある。ユーザー操作(スタートのタップ)の中で実際に発音ノードを
  // start() することで音声出力を確実に起動する。
  // 音は出さない(ゲイン0)— ノードを start すること自体が起動条件のため。
  function primeAudio(){
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    var t = audioCtx.currentTime;
    g.gain.setValueAtTime(0, t); // 終始 0 = 無音
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(t + 0.05);
  }

  // iPhone のマナースイッチ(消音スイッチ)が ON だと、Web Audio API の音は
  // 既定で無音になる。iPad には消音スイッチが無いため、この問題は出ない。
  // 音声セッションの種別を 'playback' にすると、消音スイッチに関わらず
  // 音を鳴らせる(iOS 16.4+ / Safari がサポート。未対応環境では無視される)。
  function enablePlaybackAudio(){
    try{
      if(navigator.audioSession) navigator.audioSession.type = 'playback';
    }catch(e){ /* 未対応環境では何もしない */ }
  }

  function playProblem(){
    if(!audioCtx) return;
    audioCtx.resume(); // 毎回必ず再開を要求(running でも無害)
    var now = audioCtx.currentTime + 0.06;

    if(state.level === 3){
      // 小節: 0.5秒間隔で順次(各音は余韻を残す)
      state.notes.forEach(function(n, i){
        playPiano(noteFreq(n), now + i * 0.5, 1.1, 0.30);
      });
    } else if(state.level === 2){
      // 和音: 同時発音(3音ぶん音量を控えめに)
      state.notes.forEach(function(n){
        playPiano(noteFreq(n), now, 1.9, 0.15);
      });
    } else {
      // 単音
      playPiano(noteFreq(state.notes[0]), now, 1.7, 0.30);
    }
  }

  // ---- レベル表示 ----------------------------------------------------
  function updateLevelButtons(){
    var btns = levelsBox.querySelectorAll('button');
    btns.forEach(function(b){
      b.classList.toggle('active', Number(b.dataset.level) === state.level);
    });
  }

  // ---- イベント ------------------------------------------------------
  startBtn.addEventListener('click', function(){
    enablePlaybackAudio(); // 消音スイッチを無視して鳴らせるようにする
    if(!audioCtx){
      var AC = window.AudioContext || window.webkitAudioContext;
      if(AC) audioCtx = new AC();
    }
    if(audioCtx){
      audioCtx.resume();
      primeAudio(); // 音声出力をこのタップ内で確実に起動する(無音)
    }
    overlay.classList.add('hidden');
    updateLevelButtons();
    newProblem();
  });

  levelsBox.addEventListener('click', function(e){
    var btn = e.target.closest('button');
    if(!btn) return;
    state.level = Number(btn.dataset.level);
    updateLevelButtons();
    newProblem();
  });

  // 「こたえあわせ」: 答えを表示し、同時に音を鳴らす
  answerBtn.addEventListener('click', function(){
    showAnswer();
    playProblem();
  });
  nextBtn.addEventListener('click', newProblem);

  enablePlaybackAudio(); // 早い段階で音声セッションを 'playback' に
  updateLevelButtons();
})();
</script>
</body>
</html>
